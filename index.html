<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>稅務法規題庫</title>

<!-- CSV 解析套件 -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; max-width: 900px; margin: auto; padding: 20px; }
h1 { text-align: center; }

.card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
.option { padding: 10px; border: 1px solid #ccc; margin: 5px 0; cursor: pointer; border-radius: 5px; }
.selected { background: #d0ebff; }
.correct { background: #c8f7c5; }
.wrong { background: #f7c5c5; }

button { padding: 8px 12px; margin: 5px; cursor: pointer; }

.topbar { display: flex; justify-content: space-between; align-items: center; }

.progress { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; }
.progress-bar { height: 10px; background: #4caf50; border-radius: 5px; }
</style>
</head>

<body>

<h1>📘 稅務法規題庫</h1>

<div id="menu"></div>
<div id="quiz" style="display:none;"></div>
<div id="result" style="display:none;"></div>

<script>
let allQuestions = [];
let questions = [];
let current = 0;
let answers = [];

// 讀取 CSV
async function loadCSV(path) {
  const res = await fetch(path);
  const text = await res.text();
  return Papa.parse(text, {
    header: true,
    skipEmptyLines: true
  }).data;
}

// 載入章節
async function loadChapters() {
  const chapters = await loadCSV("./data/chapters.csv");

  let html = "<h3>選擇章節（可複選）</h3>";

  chapters.forEach(ch => {
    html += `
      <div>
        <input type="checkbox" value="${ch.id}" id="${ch.id}">
        <label for="${ch.id}">${ch.title} (${ch.count}題)</label>
      </div>
    `;
  });

  html += `
    <hr>
    題目數量：
    <input type="number" id="count" value="20" min="1">
    <br><br>
    <button onclick="start('random')">隨機出題</button>
    <button onclick="start('all')">全部作答</button>
    <button onclick="loadWrong()">錯題本</button>
  `;

  document.getElementById("menu").innerHTML = html;
}

// 開始測驗
async function start(mode) {
  const selected = [...document.querySelectorAll("input[type=checkbox]:checked")]
                    .map(el => el.value);

  if (selected.length === 0) {
    alert("請選擇至少一個章節");
    return;
  }

  allQuestions = [];

  for (let ch of selected) {
    const data = await loadCSV(`./data/${ch}.csv`);
    allQuestions = allQuestions.concat(data);
  }

  if (mode === "random") {
    const count = parseInt(document.getElementById("count").value);
    questions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, count);
  } else {
    questions = allQuestions;
  }

  current = 0;
  answers = [];

  document.getElementById("menu").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  showQuestion();
}

// 顯示題目
function showQuestion() {
  const q = questions[current];
  let progress = ((current + 1) / questions.length) * 100;

  let html = `
    <div class="topbar">
      <div>第 ${current + 1} / ${questions.length} 題</div>
      <div>已作答：${answers.filter(a => a).length}</div>
    </div>

    <div class="progress">
      <div class="progress-bar" style="width:${progress}%"></div>
    </div>

    <div class="card">
      <p>${q.question}</p>
  `;

  ["A","B","C","D"].forEach(opt => {
    let selected = answers[current] === opt ? "selected" : "";
    html += `
      <div class="option ${selected}" onclick="selectAnswer('${opt}')">
        ${opt}. ${q["option" + opt]}
      </div>
    `;
  });

  html += `</div>`;

  html += `
    <button onclick="prev()">上一題</button>
    <button onclick="next()">下一題</button>
    <button onclick="submit()">交卷</button>
  `;

  document.getElementById("quiz").innerHTML = html;
}

// 選答案
function selectAnswer(opt) {
  answers[current] = opt;
  showQuestion();
}

// 下一題
function next() {
  if (current < questions.length - 1) {
    current++;
    showQuestion();
  }
}

// 上一題
function prev() {
  if (current > 0) {
    current--;
    showQuestion();
  }
}

// 交卷
function submit() {
  let wrong = [];
  let score = 0;

  questions.forEach((q, i) => {
    if (answers[i] === q.answer) {
      score++;
    } else {
      wrong.push(q);
    }
  });

  localStorage.setItem("wrong", JSON.stringify(wrong));
  showResult(score);
}

// 顯示結果
function showResult(score) {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";

  let html = `<h2>分數：${score} / ${questions.length}</h2>`;

  questions.forEach((q, i) => {
    let user = answers[i];
    let correct = q.answer;
    let cls = user === correct ? "correct" : "wrong";

    html += `
      <div class="card ${cls}">
        <p>${i + 1}. ${q.question}</p>
        <p>你的答案：${user || "未作答"} | 正確答案：${correct}</p>
        <p>解析：${q.explanation || "-"}</p>
      </div>
    `;
  });

  html += `<button onclick="location.reload()">回首頁</button>`;
  document.getElementById("result").innerHTML = html;
}

// 錯題本
function loadWrong() {
  const wrong = JSON.parse(localStorage.getItem("wrong") || "[]");

  if (wrong.length === 0) {
    alert("目前沒有錯題");
    return;
  }

  questions = wrong;
  answers = [];
  current = 0;

  document.getElementById("menu").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  showQuestion();
}

// 初始化
loadChapters();
</script>

</body>
</html>
