<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>稅務法規題庫</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .option {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 14px;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.2s;
      background: #fff;
    }

    .option:hover {
      background: #f2f8ff;
    }

    .selected {
      background: #dceeff;
      border-color: #4a90e2;
    }

    .correct {
      background: #dff5df;
      border-color: #3c9a3c;
    }

    .wrong {
      background: #fde2e2;
      border-color: #d9534f;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
      font-size: 16px;
    }

    button:hover {
      background: #449d48;
    }

    button.secondary {
      background: #888;
    }

    button.secondary:hover {
      background: #666;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 18px;
    }

    .progress {
      width: 100%;
      height: 12px;
      background: #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      background: #4caf50;
      width: 0%;
    }

    .chapter-item {
      margin-bottom: 10px;
    }

    input[type="number"] {
      padding: 8px;
      width: 100px;
      font-size: 16px;
      margin-left: 8px;
    }

    .result-block {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <h1>📘 稅務法規題庫</h1>

  <div id="menu" class="card"></div>
  <div id="quiz" style="display:none;"></div>
  <div id="result" style="display:none;"></div>

  <script>
    let allQuestions = [];
    let questions = [];
    let current = 0;
    let answers = [];

    async function loadCSV(path) {
      const res = await fetch(path);
      if (!res.ok) {
        throw new Error(`無法讀取檔案：${path}`);
      }
      const text = await res.text();
      const parsed = Papa.parse(text, {
        header: true,
        skipEmptyLines: true
      });
      return parsed.data;
    }

    async function loadChapters() {
      try {
        const chapters = await loadCSV("./data/chapters.csv");

        let html = `<h2>選擇章節</h2>`;

        chapters.forEach(ch => {
          html += `
            <div class="chapter-item">
              <input type="checkbox" id="${ch.id}" value="${ch.id}">
              <label for="${ch.id}">${ch.title}（${ch.count}題）</label>
            </div>
          `;
        });

        html += `
          <hr>
          <div style="margin: 12px 0;">
            題目數量：
            <input type="number" id="count" value="10" min="1">
          </div>
          <button onclick="startQuiz('random')">隨機出題</button>
          <button onclick="startQuiz('all')">全部作答</button>
          <button class="secondary" onclick="loadWrong()">錯題本</button>
        `;

        document.getElementById("menu").innerHTML = html;
      } catch (err) {
        document.getElementById("menu").innerHTML = `<p>載入章節失敗：${err.message}</p>`;
      }
    }

    async function startQuiz(mode) {
      try {
        const selected = [...document.querySelectorAll('input[type="checkbox"]:checked')]
          .map(el => el.value);

        if (selected.length === 0) {
          alert("請至少選擇一個章節");
          return;
        }

        allQuestions = [];

        for (const chapter of selected) {
          const data = await loadCSV(`./data/${chapter}.csv`);
          allQuestions = allQuestions.concat(data);
        }

        if (mode === "random") {
          const count = parseInt(document.getElementById("count").value, 10) || 10;
          questions = [...allQuestions]
            .sort(() => Math.random() - 0.5)
            .slice(0, Math.min(count, allQuestions.length));
        } else {
          questions = [...allQuestions];
        }

        current = 0;
        answers = new Array(questions.length).fill("");

        document.getElementById("menu").style.display = "none";
        document.getElementById("result").style.display = "none";
        document.getElementById("quiz").style.display = "block";

        showQuestion();
      } catch (err) {
        alert("載入題目失敗：" + err.message);
      }
    }

    function showQuestion() {
      const q = questions[current];
      const answeredCount = answers.filter(a => a).length;
      const progress = ((current + 1) / questions.length) * 100;

      let html = `
        <div class="topbar">
          <div>第 ${current + 1} / ${questions.length} 題</div>
          <div>已作答：${answeredCount}</div>
        </div>

        <div class="progress">
          <div class="progress-bar" style="width:${progress}%"></div>
        </div>

        <div class="card">
          <p style="font-size: 22px; line-height: 1.7;">${q.question || "題目讀取失敗"}</p>
      `;

      ["A", "B", "C", "D"].forEach(opt => {
        const value = q["option" + opt] || "";
        const selectedClass = answers[current] === opt ? "selected" : "";
        html += `
          <div class="option ${selectedClass}" onclick="selectAnswer('${opt}')">
            ${opt}. ${value}
          </div>
        `;
      });

      html += `</div>
        <button onclick="prevQuestion()">上一題</button>
        <button onclick="nextQuestion()">下一題</button>
        <button onclick="submitQuiz()">交卷</button>
      `;

      document.getElementById("quiz").innerHTML = html;
    }

    function selectAnswer(opt) {
      answers[current] = opt;
      showQuestion();
    }

    function prevQuestion() {
      if (current > 0) {
        current--;
        showQuestion();
      }
    }

    function nextQuestion() {
      if (current < questions.length - 1) {
        current++;
        showQuestion();
      }
    }

    function submitQuiz() {
      let score = 0;
      let wrong = [];

      questions.forEach((q, i) => {
        if (answers[i] === q.answer) {
          score++;
        } else {
          wrong.push(q);
        }
      });

      localStorage.setItem("wrong", JSON.stringify(wrong));
      showResult(score);
    }

    function showResult(score) {
      document.getElementById("quiz").style.display = "none";
      document.getElementById("result").style.display = "block";

      let html = `<div class="card"><h2>分數：${score} / ${questions.length}</h2></div>`;

      questions.forEach((q, i) => {
        const user = answers[i] || "未作答";
        const correct = q.answer || "-";
        const explanation = q.explanation || "-";
        const cls = answers[i] === q.answer ? "correct" : "wrong";

        html += `
          <div class="card ${cls} result-block">
            <p><strong>${i + 1}. ${q.question}</strong></p>
            <p>你的答案：${user}</p>
            <p>正確答案：${correct}</p>
            <p>解析：${explanation}</p>
          </div>
        `;
      });

      html += `<button onclick="location.reload()">回首頁</button>`;
      document.getElementById("result").innerHTML = html;
    }

    function loadWrong() {
      const wrong = JSON.parse(localStorage.getItem("wrong") || "[]");

      if (wrong.length === 0) {
        alert("目前沒有錯題");
        return;
      }

      questions = wrong;
      current = 0;
      answers = new Array(questions.length).fill("");

      document.getElementById("menu").style.display = "none";
      document.getElementById("result").style.display = "none";
      document.getElementById("quiz").style.display = "block";

      showQuestion();
    }

    loadChapters();
  </script>
</body>
</html>
