<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>稅務法規題庫</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 {
      text-align: center;
      margin: 24px 0 32px;
      font-size: 52px;
      font-weight: 700;
    }

    h2 {
      margin-top: 0;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .chapter-item {
      margin: 12px 0;
      font-size: 20px;
    }

    .chapter-item label {
      cursor: pointer;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    input[type="number"] {
      width: 110px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #449d48;
    }

    button.secondary {
      background: #888;
    }

    button.secondary:hover {
      background: #666;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .progress {
      width: 100%;
      height: 14px;
      background: #e6e6e6;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      background: #4caf50;
      width: 0%;
    }

    .question-text {
      font-size: 28px;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    .option {
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 14px 16px;
      margin: 10px 0;
      cursor: pointer;
      background: #fff;
      font-size: 18px;
      line-height: 1.6;
      transition: 0.2s;
    }

    .option:hover {
      background: #f2f8ff;
    }

    .selected {
      background: #dceeff;
      border-color: #4a90e2;
    }

    .correct {
      background: #dff5df;
      border-color: #3c9a3c;
    }

    .wrong {
      background: #fde2e2;
      border-color: #d9534f;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .result-block p {
      margin: 8px 0;
      line-height: 1.7;
    }

    .empty-message {
      color: #666;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 38px;
      }

      .question-text {
        font-size: 22px;
      }

      .chapter-item {
        font-size: 18px;
      }

      .option {
        font-size: 17px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📘 稅務法規題庫</h1>

    <div id="menu" class="card"></div>
    <div id="quiz" style="display:none;"></div>
    <div id="result" style="display:none;"></div>
  </div>

  <script>
    let allQuestions = [];
    let questions = [];
    let current = 0;
    let answers = [];

    async function loadCSV(path) {
      const res = await fetch(path);
      if (!res.ok) {
        throw new Error(`無法讀取檔案：${path}`);
      }

      const text = await res.text();
      const parsed = Papa.parse(text, {
        header: true,
        skipEmptyLines: true
      });

      return parsed.data;
    }

    async function loadChapters() {
      try {
        const chapters = await loadCSV("./data/chapters.csv");

        if (!chapters.length) {
          document.getElementById("menu").innerHTML = `
            <h2>選擇章節</h2>
            <p class="empty-message">目前沒有章節資料，請先建立 data/chapters.csv。</p>
          `;
          return;
        }

        let html = `<h2>選擇章節</h2>`;

        chapters.forEach(ch => {
          const chapterId = (ch.id || "").trim();
          const chapterTitle = (ch.title || "").trim();

          if (!chapterId || !chapterTitle) return;

          html += `
            <div class="chapter-item">
              <input type="checkbox" id="${chapterId}" value="${chapterId}">
              <label for="${chapterId}">${chapterTitle}</label>
            </div>
          `;
        });

        html += `
          <hr>
          <div class="controls">
            <label for="count">隨機題數：</label>
            <input type="number" id="count" value="10" min="1">
            <button onclick="startQuiz('random')">隨機出題</button>
            <button onclick="startQuiz('all')">全部作答</button>
            <button class="secondary" onclick="loadWrong()">錯題本</button>
          </div>
        `;

        document.getElementById("menu").innerHTML = html;
      } catch (err) {
        document.getElementById("menu").innerHTML = `
          <h2>選擇章節</h2>
          <p class="empty-message">載入章節失敗：${err.message}</p>
        `;
      }
    }

    async function startQuiz(mode) {
      try {
        const selected = [...document.querySelectorAll('input[type="checkbox"]:checked')]
          .map(el => el.value);

        if (selected.length === 0) {
          alert("請至少選擇一個章節");
          return;
        }

        allQuestions = [];

        for (const chapter of selected) {
          const data = await loadCSV(`./data/${chapter}.csv`);
          allQuestions = allQuestions.concat(data);
        }

        if (!allQuestions.length) {
          alert("找不到題目資料");
          return;
        }

        if (mode === "random") {
          const count = parseInt(document.getElementById("count").value, 10) || 10;
          questions = [...allQuestions]
            .sort(() => Math.random() - 0.5)
            .slice(0, Math.min(count, allQuestions.length));
        } else {
          questions = [...allQuestions];
        }

        current = 0;
        answers = new Array(questions.length).fill("");

        document.getElementById("menu").style.display = "none";
        document.getElementById("result").style.display = "none";
        document.getElementById("quiz").style.display = "block";

        showQuestion();
      } catch (err) {
        alert("載入題目失敗：" + err.message);
      }
    }

    function showQuestion() {
      const q = questions[current];
      const answeredCount = answers.filter(a => a).length;
      const progress = ((current + 1) / questions.length) * 100;

      let html = `
        <div class="topbar">
          <div>第 ${current + 1} / ${questions.length} 題</div>
          <div>已作答：${answeredCount}</div>
        </div>

        <div class="progress">
          <div class="progress-bar" style="width:${progress}%"></div>
        </div>

        <div class="card">
          <div class="question-text">${q.question || "題目讀取失敗"}</div>
      `;

      ["A", "B", "C", "D"].forEach(opt => {
        const value = q["option" + opt] || "";
        const selectedClass = answers[current] === opt ? "selected" : "";
        html += `
          <div class="option ${selectedClass}" onclick="selectAnswer('${opt}')">
            ${opt}. ${value}
          </div>
        `;
      });

      html += `
        </div>

        <div class="actions">
          <button class="secondary" onclick="prevQuestion()">上一題</button>
          <button class="secondary" onclick="nextQuestion()">下一題</button>
          <button onclick="submitQuiz()">交卷</button>
        </div>
      `;

      document.getElementById("quiz").innerHTML = html;
    }

    function selectAnswer(opt) {
      answers[current] = opt;
      showQuestion();
    }

    function prevQuestion() {
      if (current > 0) {
        current--;
        showQuestion();
      }
    }

    function nextQuestion() {
      if (current < questions.length - 1) {
        current++;
        showQuestion();
      }
    }

    function submitQuiz() {
      let score = 0;
      let wrong = [];

      questions.forEach((q, i) => {
        if (answers[i] === q.answer) {
          score++;
        } else {
          wrong.push(q);
        }
      });

      localStorage.setItem("wrong", JSON.stringify(wrong));
      showResult(score);
    }

    function showResult(score) {
      document.getElementById("quiz").style.display = "none";
      document.getElementById("result").style.display = "block";

      let html = `<div class="card"><h2>分數：${score} / ${questions.length}</h2></div>`;

      questions.forEach((q, i) => {
        const user = answers[i] || "未作答";
        const correct = q.answer || "-";
        const explanation = q.explanation || "-";
        const cls = answers[i] === q.answer ? "correct" : "wrong";

        html += `
          <div class="card result-block ${cls}">
            <p><strong>${i + 1}. ${q.question}</strong></p>
            <p>你的答案：${user}</p>
            <p>正確答案：${correct}</p>
            <p>解析：${explanation}</p>
          </div>
        `;
      });

      html += `<button onclick="location.reload()">回首頁</button>`;
      document.getElementById("result").innerHTML = html;
    }

    function loadWrong() {
      const wrong = JSON.parse(localStorage.getItem("wrong") || "[]");

      if (wrong.length === 0) {
        alert("目前沒有錯題");
        return;
      }

      questions = wrong;
      current = 0;
      answers = new Array(questions.length).fill("");

      document.getElementById("menu").style.display = "none";
      document.getElementById("result").style.display = "none";
      document.getElementById("quiz").style.display = "block";

      showQuestion();
    }

    loadChapters();
  </script>
</body>
</html>
