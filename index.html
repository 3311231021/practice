<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0f5f75">
  <title>iPAS 淨零碳模擬測驗</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">iPAS 淨零碳規劃管理師</p>
      <h1>模擬測驗</h1>
      <p class="subtitle">依級別、考科與題數自由練習，答錯立即顯示解答。</p>
    </header>

    <section id="setup" class="card setup-card" aria-labelledby="setupTitle">
      <h2 id="setupTitle" class="section-title">選擇測驗方式</h2>
      <div class="setup-grid">
        <label>級別
          <select id="level">
            <option value="初級">初級</option>
            <option value="中級">中級</option>
            <option value="全部">全部級別</option>
          </select>
        </label>
        <label>考科
          <select id="subject">
            <option value="考科一">考科一</option>
            <option value="考科二">考科二</option>
            <option value="全部">兩科混合</option>
          </select>
        </label>
        <label>題數
          <select id="count">
            <option value="5">5 題</option>
            <option value="10">10 題</option>
            <option value="50">50 題</option>
          </select>
        </label>
      </div>
      <button id="startBtn" class="primary-btn">開始測驗</button>
      <p id="loadStatus" class="muted" aria-live="polite">正在載入題庫…</p>
    </section>

    <section id="quiz" class="card hidden" aria-live="polite">
      <div class="quiz-top">
        <span id="progress"></span>
        <span id="score"></span>
      </div>
      <p id="quizTag" class="tag"></p>
      <h2 id="question" class="question"></h2>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback hidden"></div>
      <button id="nextBtn" class="primary-btn hidden">下一題</button>
    </section>

    <section id="result" class="card hidden">
      <h2>測驗完成</h2>
      <p id="resultText" class="result-text"></p>
      <div id="wrongList"></div>
      <button id="restartBtn" class="primary-btn">重新選題</button>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
